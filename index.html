<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção</title>
</head>

<body>
    <h1>Formulário de Adoção </h1>

    <form id="FormulárioAdoção">
        <label for="nome">Nome:</label>
        <imput type="text" id="nome" placeholder="Digite seu nome">
            <br>
            <label for="Email">Email:</label>
            <imput type="Email" id="Email" placeholder="Digite seu email">
                <br>
                <label for="">Telefone:</label>
                <imput type="Telefone" id="Telefone" placeholder="Digite seu Telefone">
                    <br>
                    <label for="CPF">CPF:</label>
                    <imput type="CPF" id="email" placeholder="Digite seu CPF">
                        <br>
                        <label for="Idade">Idade:</label>
                        <imput type="Idade" id="email" placeholder="Digite sua idade">
                            <br>
                            <label for="Cidade">Cidade:</label>
                            <imput type="Cidade" id="Cidade" placeholder="Digite sua Cidade">
                                <br>
                                <label for="moradia">Moradia</label>
                                <select name="moradia" : id="moradia">
                                    <option value=""> Selecione</option>
                                    <option value="casa">Casa</option>
                                    <option value="apartamento">Apartamento</option>
                                </select>
                                <br>
                                <label for="Quintal">Possui quintal?:</label>
                                <imput type="radio" name="Quintal" value="sim">Sim
                                    <imput type="radio" name="Quintal" value="nao">Não
                                        <br>
                                        <label for="Pet">Ja teve pet ?:</label>
                                        <imput type="radio" name="Pet" value="sim">Sim
                                            <imput type="radio" name="Pet" value="nao">Não
                                                <br>
                                                <label for="horas">Quanto tempo o pet ficará sozinho?</label>
                                                <imput type="number" id="horas">
                                                    <br>
                                                    <label for="motivo">Motivo da Adoção do Pet?</label>
                                                    <br>
                                                    <textarea name="motivo" id="motivo"></textarea>
                                                    <br>
                                                    <label for="permite">Permite pets? (Apartamento)</label>
                                                    <imput type="checkbox" id="permite">
                                                        <br>
                                                        <label for="permite">Possui quintal Seguro?</label>
                                                        <imput type="checkbox" id="seguro">
                                                            <br>
                                                            <label for="permite">Possui condições financeiras?</label>
                                                            <imput type="checkbox" id="financeiro">
                                                                <br>
                                                                <label for="impulso">Aceito o termo:</label>
                                                                <imput type="checkbox" id="termo">
                                                                    <br>




















    </form>
</body>

</html>
