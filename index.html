<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Adoção</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="FormulárioAdoção">
        <form>
            <h1>Formulário de Adoção </h1>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
            <br>
            <br>
            <label for="Email">Email:</label>
            <input type="Email" id="Email" placeholder="Digite seu email">
            <br>
            <br>
            <label for="telefone">Telefone:</label>
            <input type="telefone" id="telefone" placeholder="47999999999" required>
            <br>
            <br>
            <label for="cpf">CPF:</label>
            <input type="cpf" id="cpf" placeholder="99999999999" required>
            <br>
            <br>
            <label for="idade">Idade:</label>
            <input type="idade" id="idade" placeholder="18" required>
            <br>
            <br>
            <label for="cidade">Cidade:</label>
            <input type="cidade" id="cidade" placeholder="Digite sua Cidade">
            <br>
            <br>
            <label for="moradia">Moradia</label>
            <select name="moradia" : id="moradia">
                <option value="selecione"> Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>
            <br>
            <br>
            <label for="quintal">Possui quintal?:</label>
            <input type="radio" name="quintal" value="sim">Sim
            <input type="radio" name="quintal" value="nao">Não
            <br>
            <br>
            <label for="Pet">Ja teve pet ?:</label>
            <input type="radio" name="pet" value="sim">Sim
            <input type="radio" name="pet" value="nao">Não
            <br>
            <br>
            <label for="horas">Quanto tempo o pet ficará sozinho?</label>
            <input type="number" id="horas">
            <br>
            <br>
            <label for="motivo">Motivo da Adoção do Pet?</label>
            <br>
            <br>
            <textarea name="motivo" id="motivo"></textarea>
            <br>
            <br>
            <label for="permite">Permite pets? (Apartamento)</label>
            <input type="checkbox" id="permite">
            <br>
            <br>
            <label for="permite">Possui quintal Seguro?</label>
            <input type="checkbox" id="seguro">
            <br>
            <br>
            <label for="permite">Possui condições financeiras?</label>
            <input type="checkbox" id="financeiro">
            <br>
            <br>
            <label for="impulso">Decidiu adotar hoje:</label>
            <input type="checkbox" id="impulso">
            <br>
            <br>
            <label for="impulso">Aceito o termo:</label>
            <input type="checkbox" id="termo">
            <br>
            <br>
            <button type="submit">Enviar</button>




        </form>
        <h2 id="resultado"></h2>
        <script src="adocao.js"></script>
    </div>
</body>

</html>
